[gateway]
url = "ws://127.0.0.1:8080/gateway"
token = ""
password = ""

[gateway.server]
bind = "127.0.0.1:8765"
http_bind = "127.0.0.1:8766"
auth_mode = "auto"

[runtime]
audit_only = false
state_path = "memory://openclaw-go-state"
profile = "core"

[channels.telegram]
bot_token = ""
default_target = ""

# Multi-channel adapters (v2.6.0-go)
